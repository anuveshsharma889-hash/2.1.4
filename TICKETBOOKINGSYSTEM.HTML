<!DOCTYPE html>
<html>
<head>

<title>Ticket Booking System</title>

<style>

body{
font-family: Arial;
text-align:center;
background:#f4f4f4;
}

h1{
margin-top:30px;
}

.seat{
width:60px;
height:60px;
margin:10px;
display:inline-flex;
align-items:center;
justify-content:center;
border-radius:8px;
cursor:pointer;
background:#28a745;
color:white;
font-weight:bold;
}

.booked{
background:red;
cursor:not-allowed;
}

.container{
margin-top:40px;
}

</style>

</head>

<body>

<h1>Movie Ticket Booking</h1>

<p>Select a seat to book</p>

<div class="container" id="seats"></div>

<script>

// seat data
let seats = [
{seat:"A1", booked:false},
{seat:"A2", booked:false},
{seat:"A3", booked:false},
{seat:"A4", booked:false},
{seat:"B1", booked:false},
{seat:"B2", booked:false},
{seat:"B3", booked:false},
{seat:"B4", booked:false}
];

function displaySeats(){

let html = "";

seats.forEach((s,index)=>{

let className = s.booked ? "seat booked" : "seat";

html += `
<div class="${className}" onclick="bookSeat(${index})">
${s.seat}
</div>
`;

});

document.getElementById("seats").innerHTML = html;

}

function bookSeat(index){

if(seats[index].booked){

alert("Seat already booked!");

return;

}

seats[index].booked = true;

alert("Seat " + seats[index].seat + " booked successfully");

displaySeats();

}

// load seats
displaySeats();

</script>

</body>
</html>
